<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini Maze: Ascension</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="ui">
    <div class="title">MINI MAZE: ASCENSION</div>

    <div class="row">
      <input id="name" maxlength="24" placeholder="Name (for leaderboard)" />
      <button id="start">Start Run</button>
      <button id="finish" disabled>End Run (Submit)</button>
    </div>

    <div class="stats">
      <div>Run: <span id="runId">-</span></div>
      <div>Level: <span id="level">1</span></div>
      <div>Score: <span id="score">0</span></div>
      <div>Bosses: <span id="bosses">0</span></div>
    </div>

    <div class="row">
      <button id="levelUp" disabled>Simulate Level Clear</button>
      <button id="bossKill" disabled>Simulate Boss Kill</button>
      <button id="refreshLB">Refresh Leaderboard</button>
    </div>

    <pre id="lb"></pre>
  </div>

  <canvas id="c"></canvas>
  <script src="game.js"></script>
</body>
</html>
